# GitHub secret scanning exclusions.
# These paths contain fabricated, non-functional secret-looking strings used
# as fixtures to test the http-recorder's redaction / secret-detection feature
# (e.g. "AIzaSy..." Google-key-shaped value, "sk-1234..." OpenAI-key-shaped
# value). They are not real credentials and cannot be used to access anything.
# The test asserts the recorder DETECTS these patterns, so the fixtures must
# keep their credential-like shape and cannot be defanged.
paths-ignore:
  - "packages/http-recorder/test/record-replay.test.ts"
